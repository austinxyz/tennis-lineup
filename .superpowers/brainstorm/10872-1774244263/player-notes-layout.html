<h2>队员笔记 — 新布局设计</h2>
<p class="subtitle">Notes 整合进球员列表，展开单行编辑</p>

<div class="mockup">
  <div class="mockup-header">球员列表（整合笔记后）</div>
  <div class="mockup-body" style="padding:0">

    <!-- Top bar -->
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #e5e7eb;background:#f9fafb">
      <span style="font-weight:600;color:#111;font-size:14px">球员列表 (8)</span>
      <div style="display:flex;gap:8px">
        <button style="background:#d97706;color:white;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer">批量编辑 UTR</button>
        <button style="background:#6366f1;color:white;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer">批量编辑 Notes</button>
        <button style="background:#16a34a;color:white;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer">添加球员</button>
      </div>
    </div>

    <!-- Table header -->
    <div style="display:grid;grid-template-columns:24px 1fr 60px 70px 70px 80px;gap:0;border-bottom:1px solid #e5e7eb;background:#f9fafb;padding:8px 16px;font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase">
      <span></span>
      <span>姓名</span>
      <span>性别</span>
      <span>UTR</span>
      <span>已验证</span>
      <span>操作</span>
    </div>

    <!-- Player row — collapsed -->
    <div style="border-bottom:1px solid #f3f4f6">
      <div style="display:grid;grid-template-columns:24px 1fr 60px 70px 70px 80px;align-items:center;padding:10px 16px;cursor:pointer;background:white">
        <span style="color:#9ca3af;font-size:12px">▶</span>
        <span style="font-size:13px;font-weight:500;color:#111">张三</span>
        <span><span style="background:#dbeafe;color:#1d4ed8;padding:2px 6px;border-radius:9999px;font-size:11px;font-weight:600">男</span></span>
        <span style="font-size:13px;color:#374151">7.50</span>
        <span><span style="background:#dcfce7;color:#166534;padding:2px 6px;border-radius:9999px;font-size:11px;font-weight:600">已验证</span></span>
        <div style="display:flex;gap:8px">
          <span style="color:#4f46e5;font-size:12px;cursor:pointer">编辑</span>
          <span style="color:#dc2626;font-size:12px;cursor:pointer">删除</span>
        </div>
      </div>
    </div>

    <!-- Player row — EXPANDED -->
    <div style="border-bottom:1px solid #e5e7eb;background:#fafafa">
      <!-- Row header -->
      <div style="display:grid;grid-template-columns:24px 1fr 60px 70px 70px 80px;align-items:center;padding:10px 16px;cursor:pointer;background:#eff6ff">
        <span style="color:#3b82f6;font-size:12px">▼</span>
        <span style="font-size:13px;font-weight:500;color:#1d4ed8">李四</span>
        <span><span style="background:#dbeafe;color:#1d4ed8;padding:2px 6px;border-radius:9999px;font-size:11px;font-weight:600">男</span></span>
        <span style="font-size:13px;color:#374151">6.80</span>
        <span><span style="background:#dcfce7;color:#166534;padding:2px 6px;border-radius:9999px;font-size:11px;font-weight:600">已验证</span></span>
        <div style="display:flex;gap:8px">
          <span style="color:#4f46e5;font-size:12px;cursor:pointer">编辑</span>
          <span style="color:#dc2626;font-size:12px;cursor:pointer">删除</span>
        </div>
      </div>

      <!-- Expanded content -->
      <div style="padding:12px 16px 16px 40px;border-top:1px solid #dbeafe">

        <!-- Personal note -->
        <div style="margin-bottom:14px">
          <label style="font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;display:block;margin-bottom:4px">个人备注</label>
          <input type="text" value="发球强，底线稳定，擅长正手" style="width:100%;max-width:480px;padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;color:#374151" />
        </div>

        <!-- Partner notes -->
        <div>
          <label style="font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;display:block;margin-bottom:6px">搭档笔记</label>

          <!-- Existing partner note row -->
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <select style="padding:5px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;color:#374151;min-width:100px">
              <option selected>张三</option>
            </select>
            <input type="text" value="默契很好，一起打过3次USTA，2胜1负" style="flex:1;max-width:360px;padding:5px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;color:#374151" />
            <button style="background:none;border:none;color:#9ca3af;cursor:pointer;font-size:14px;padding:4px">✕</button>
          </div>

          <!-- Another partner note row -->
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <select style="padding:5px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;color:#374151;min-width:100px">
              <option selected>王五</option>
            </select>
            <input type="text" value="网前配合好，发球+截击战术效果佳" style="flex:1;max-width:360px;padding:5px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;color:#374151" />
            <button style="background:none;border:none;color:#9ca3af;cursor:pointer;font-size:14px;padding:4px">✕</button>
          </div>

          <!-- Empty new row to add -->
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <select style="padding:5px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;color:#9ca3af;min-width:100px">
              <option>选搭档…</option>
            </select>
            <input type="text" placeholder="添加笔记…" style="flex:1;max-width:360px;padding:5px 10px;border:1px dashed #d1d5db;border-radius:6px;font-size:12px;color:#9ca3af" />
          </div>

          <!-- Save -->
          <button style="background:#3b82f6;color:white;border:none;padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer">保存</button>
          <button style="background:none;border:1px solid #d1d5db;color:#6b7280;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;margin-left:6px">取消</button>
        </div>
      </div>
    </div>

    <!-- More rows (collapsed) -->
    <div style="border-bottom:1px solid #f3f4f6">
      <div style="display:grid;grid-template-columns:24px 1fr 60px 70px 70px 80px;align-items:center;padding:10px 16px;cursor:pointer;background:white">
        <span style="color:#9ca3af;font-size:12px">▶</span>
        <span style="font-size:13px;font-weight:500;color:#111">王五</span>
        <span><span style="background:#fce7f3;color:#9d174d;padding:2px 6px;border-radius:9999px;font-size:11px;font-weight:600">女</span></span>
        <span style="font-size:13px;color:#374151">5.20</span>
        <span><span style="background:#fef9c3;color:#854d0e;padding:2px 6px;border-radius:9999px;font-size:11px;font-weight:600">未验证</span></span>
        <div style="display:flex;gap:8px">
          <span style="color:#4f46e5;font-size:12px;cursor:pointer">编辑</span>
          <span style="color:#dc2626;font-size:12px;cursor:pointer">删除</span>
        </div>
      </div>
    </div>

    <div style="padding:8px 16px;color:#9ca3af;font-size:12px;text-align:center">… 更多球员</div>
  </div>
</div>

<div style="margin-top:20px">
  <h3 style="margin-bottom:8px">批量编辑 Notes 模态框（点击顶栏按钮后）</h3>
  <div class="mockup">
    <div class="mockup-header">批量编辑个人备注</div>
    <div class="mockup-body" style="padding:0">
      <div style="padding:12px 16px;border-bottom:1px solid #e5e7eb">
        <p style="font-size:12px;color:#6b7280;margin:0">为每位球员编辑个人备注，完成后点击"保存全部"</p>
      </div>
      <div style="max-height:240px;overflow-y:auto;padding:8px 16px">
        <div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #f3f4f6">
          <span style="min-width:60px;font-size:13px;font-weight:500;color:#111">张三</span>
          <span style="min-width:30px;font-size:11px;color:#6b7280">7.5</span>
          <input type="text" value="发球强，底线稳定" style="flex:1;padding:5px 8px;border:1px solid #d1d5db;border-radius:5px;font-size:12px" />
        </div>
        <div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #f3f4f6">
          <span style="min-width:60px;font-size:13px;font-weight:500;color:#111">李四</span>
          <span style="min-width:30px;font-size:11px;color:#6b7280">6.8</span>
          <input type="text" placeholder="暂无备注…" style="flex:1;padding:5px 8px;border:1px solid #d1d5db;border-radius:5px;font-size:12px;color:#9ca3af" />
        </div>
        <div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #f3f4f6">
          <span style="min-width:60px;font-size:13px;font-weight:500;color:#111">王五</span>
          <span style="min-width:30px;font-size:11px;color:#6b7280">5.2</span>
          <input type="text" value="擅长网前" style="flex:1;padding:5px 8px;border:1px solid #d1d5db;border-radius:5px;font-size:12px" />
        </div>
        <div style="display:flex;align-items:center;gap:10px;padding:6px 0">
          <span style="min-width:60px;font-size:13px;font-weight:500;color:#111">赵六</span>
          <span style="min-width:30px;font-size:11px;color:#6b7280">4.9</span>
          <input type="text" placeholder="暂无备注…" style="flex:1;padding:5px 8px;border:1px solid #d1d5db;border-radius:5px;font-size:12px;color:#9ca3af" />
        </div>
      </div>
      <div style="padding:10px 16px;border-top:1px solid #e5e7eb;display:flex;justify-content:flex-end;gap:8px">
        <button style="background:none;border:1px solid #d1d5db;color:#374151;padding:6px 14px;border-radius:6px;font-size:13px">取消</button>
        <button style="background:#3b82f6;color:white;border:none;padding:6px 14px;border-radius:6px;font-size:13px">保存全部</button>
      </div>
    </div>
  </div>
</div>

<p class="subtitle" style="margin-top:16px">看看这个布局是否符合您的设想？有没有需要调整的地方？</p>
