schema: spec-driven

# Project context
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
context: |
  ## Tech Stack

  ### Backend
  - Framework: Spring Boot (Java 17+)
  - AI Service: 智谱 AI Java SDK (GLM-4 model)
  - Storage: JSON files (no database for MVP)
  - Build Tool: Maven
  - JDK Version: 17 or later

  ### Frontend
  - Framework: Vue 3 with Composition API
  - UI Library: Tailwind CSS (no custom CSS)
  - Router: Vue Router 4
  - Build Tool: Vite

  ### Architecture Pattern
  - REST API with JSON file storage
  - Frontend-Backend separation
  - Sidebar + Main Content layout (reference: finance project)

  ## Conventions

  ### Code Style
  - Java: Use Spring Boot conventions, standard naming
  - Vue: Always use `<script setup>`, no Options API
  - CSS: Always use Tailwind utility classes, no inline styles or scoped CSS

  ### API Design
  - RESTful endpoints with proper HTTP methods
  - Response format: `{ success: boolean, data?: any, error?: { code, message, details } }`
  - Error codes: CONSTRAINT_VIOLATION, NOT_FOUND, INTERNAL_ERROR

  ### Git Workflow
  - Use conventional commits
  - Commit format: `type(scope): description`
  - Types: feat, fix, docs, refactor, test, chore

  ## Domain Knowledge

  ### Tennis Tournament Format
  - Four-doubles scoring system: D1 (1 point), D2 (2 points), D3 (3 points), D4 (4 points)
  - Each pair can be men's doubles, women's doubles, or mixed doubles
  - No "strategy" ordering: UTR must satisfy D1 >= D2 >= D3 >= D4
  - Each team needs 8 players for a full lineup

  ### UTR (Universal Tennis Rating)
  - UTR is a numerical rating of tennis player skill level
  - Typical UTR range: 1.0 - 16.0
  - UTR is used to pair players of similar skill levels
  - Doubles UTR may differ from singles UTR
  - "Verified Doubles UTR" means the player's doubles rating is officially verified

  ### Hard Constraints (Must Satisfy)
  - Minimum players: 8 players required to generate lineup
  - UTR ordering: Combined UTR must decrease from D1 to D4
  - Total UTR cap: Sum of all 8 players' individual UTR <= 40.5
  - Female players: At least 2 female players must play
  - Partner gap: Individual UTR difference between partners <= 3.5
  - D4 verification: Both players in D4 must have 100% Verified Doubles UTR
  - Player uniqueness: Each player can only appear in one pair

  ### UTR Calculation Rules
  - Pair combined UTR = Player1 UTR + Player2 UTR
  - Total UTR = Sum of all 8 players' individual UTRs
  - Example: 8 players with UTRs [4.8, 4.5, 4.3, 4.1, 4.0, 3.9, 3.8, 3.7] = 33.1 total

  ### Lineup Generation Strategy
  - Preset strategies: "balanced" (minimize UTR variance), "aggressive" (maximize D1-D3 UTR)
  - Custom strategy: Natural language description interpreted by AI
  - AI fallback: When AI fails, use heuristic algorithm
  - Algorithm complexity: O(~10,000) for 8 players, feasible within 5s response time

  ## Data Model

  ### Player
  - id: string (unique)
  - name: string
  - gender: "male" | "female"
  - utr: number (0.0 - 16.0)
  - verifiedDoublesUtr: number | null
  - verified: boolean (has 100% Verified Doubles UTR)

  ### Team
  - id: string (unique)
  - name: string (max 50 chars)
  - createdAt: ISO 8601 timestamp
  - players: Player[] (min 8 for lineup generation)
  - lineups: Lineup[] (historical record)

  ### Lineup
  - id: string (unique)
  - createdAt: ISO 8601 timestamp
  - strategy: string (description of strategy used)
  - pairs: Pair[4] (D1, D2, D3, D4 with positions and points)
  - totalUtr: number
  - valid: boolean
  - violationMessages: string[]

  ## Testing Strategy

  ### Unit Testing
  - Java: JUnit 5 for all service methods
  - Vue: Vitest for components and composables
  - Focus areas:
    - ConstraintService: All 7 validation rules
    - CombinationGenerator: Backtracking algorithm correctness
    - Validation utilities: UTR calculations, edge cases

  ### Integration Testing
  - REST API endpoints with test data
  - JSON file read/write operations
  - AI service integration (mocked for reliability)

  ### E2E Testing
  - Core user flows (optional for MVP):
    - Create team and add players
    - Generate lineup with preset strategy
    - Generate lineup against opponent

  ### Test Data
  - Valid team with 8 players satisfying all constraints
  - Invalid team with < 8 players
  - Edge cases: All female, all male, UTR at boundaries
  - Opponent lineup scenarios

  ## Performance Requirements
  - Response time: Lineup generation < 5 seconds (including AI call)
  - Concurrency: Support 10+ simultaneous users
  - JSON file operations: Thread-safe with ReadWriteLock

  ## Security Considerations
  - Input validation: All user inputs validated (UTR range, string length, enum values)
  - API Key management: Configured via environment variable (ZHIPU_API_KEY)
  - Sensitive operations: Confirmation required for deletions
  - Regular backups: JSON data files should be backed up

# Per-artifact rules
rules:
  proposal:
    - Include clear success criteria
    - List potential risks and mitigation
    - Estimate implementation effort
  tasks:
    - Break tasks into chunks of max 4 hours
    - Each task should have clear acceptance criteria
    - Test tasks should accompany implementation tasks
  api:
    - Follow RESTful conventions
    - Include request/response examples
    - Document error codes and handling
